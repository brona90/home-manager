name: CI

on:
  push:
    # Both branches listed for fork-friendliness (repo uses master)
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

# Fork-friendly: Use repository variables or fall back to defaults
# Forkers can set these in Settings → Secrets and variables → Actions → Variables
env:
  CACHIX_CACHE: ${{ vars.CACHIX_CACHE || 'gfoster' }}
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME || 'brona90' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Run statix
        run: nix run nixpkgs#statix -- check .
      - name: Run deadnix
        run: nix run nixpkgs#deadnix -- -f .
      - name: Check Nix formatting
        run: nix run nixpkgs#alejandra -- --check .
      - name: Shellcheck bootstrap.sh
        run: nix run nixpkgs#shellcheck -- bootstrap.sh

  check:
    name: Flake Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            sandbox = false
      - uses: cachix/cachix-action@v16
        with:
          name: nix-community
          extraPullNames: emacs,${{ env.CACHIX_CACHE }}
      - run: nix flake check

  build-home:
    name: Build Home Configurations
    runs-on: ${{ matrix.runner }}
    needs: check
    # Run on push to main/master (not PRs) to populate cache
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    strategy:
      matrix:
        include:
          - config: gfoster@x86_64-linux
            runner: ubuntu-latest
          - config: 888973@aarch64-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            sandbox = false

      # This job PUSHES to cachix (has authToken)
      - uses: cachix/cachix-action@v16
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community,emacs

      - name: Free disk space
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Build home configuration
        run: |
          echo "Building homeConfigurations.${{ matrix.config }}"
          nix build '.#homeConfigurations."${{ matrix.config }}".activationPackage'
          echo "Build complete - artifacts pushed to cachix automatically"

  docker-build:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: build-home  # Run after home configs cached
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    # Only run on push to main/master (not PRs)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            sandbox = false

      # Read-only: pull from caches but don't push (Docker images bloat cachix)
      - uses: cachix/cachix-action@v16
        with:
          name: ${{ env.CACHIX_CACHE }}
          extraPullNames: nix-community,emacs
      
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      
      - name: Generate image tag
        id: tag
        run: echo "tag=$(date +%Y%m%d)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      
      - name: Build Docker image
        run: |
          nix build .#dockerImage
          docker load < result
      
      - name: Push to Docker Hub
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::notice::Skipping Docker Hub push - DOCKERHUB_TOKEN not configured"
            echo "To enable Docker push, add DOCKERHUB_TOKEN secret in repository settings"
            exit 0
          fi
          
          IMAGE="${{ env.DOCKER_USERNAME }}/terminal"
          
          echo "$DOCKERHUB_TOKEN" | docker login -u "${{ env.DOCKER_USERNAME }}" --password-stdin
          docker tag "$IMAGE:latest" "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$IMAGE_TAG"
          
          echo "::notice::Pushed $IMAGE:$IMAGE_TAG and $IMAGE:latest"

  docker-test:
    name: Test Docker Image
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Pull and test image
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ needs.docker-build.outputs.image_tag }}
        run: |
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::notice::Skipping Docker test - no image was pushed"
            exit 0
          fi
          
          IMAGE="${{ env.DOCKER_USERNAME }}/terminal:$IMAGE_TAG"
          
          echo "Pulling image: $IMAGE"
          docker pull "$IMAGE"
          
          echo "=== Testing tools exist and are executable ==="
          docker run --rm "$IMAGE" zsh -c "
            set -euo pipefail
            check() { local tool=\$1; shift; \$tool \"\$@\" >/dev/null 2>&1 && echo \"✓ \$tool\" || { echo \"✗ \$tool FAILED\"; exit 1; }; }
            check tmux -V
            check emacs --version
            check starship --version
            check mise --version
            check lvim --version
            check fzf --version
            check rg --version
            check fd --version
            check bat --version
            check btop --version
            check git --version
            check zsh --version
          "

          echo "=== Testing interactive shell loads ==="
          docker run --rm "$IMAGE" zsh -i -c "echo 'Shell loaded successfully'"

          echo "=== Testing zsh startup time ==="
          docker run --rm "$IMAGE" zsh -i -c "exit" 2>&1 | grep -v "^$" || true

          echo "=== All tests passed ==="

  validate-nixos:
    name: Validate NixOS
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            sandbox = false

      # Read-only: pull from caches but don't push
      - uses: cachix/cachix-action@v16
        with:
          name: ${{ env.CACHIX_CACHE }}
          extraPullNames: nix-community,emacs
      
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      
      - name: Build NixOS configuration
        run: nix build .#nixosConfigurations.nixos.config.system.build.toplevel
